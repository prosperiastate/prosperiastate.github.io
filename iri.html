<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Iowa IRI Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
    height:100%;
    margin:0;
}

#map {
    width:100%;
    height:100%;
}

.legend {
    background:white;
    padding:14px;
    line-height:24px;
    font-family:Arial;
    font-size:16px;
    box-shadow:0 0 12px rgba(0,0,0,0.3);
    border-radius:8px;
}

.legend i {
    width:20px;
    height:20px;
    float:left;
    margin-right:10px;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// Initial Iowa zoom
var map = L.map('map').setView([42.05, -93.5], 8);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}
).addTo(map);


// Color scheme
function getColor(cls){
    return {
        "Excellent":"#2E7D32",
        "Good":"#8BC34A",
        "Fair":"#FFFF00",
        "Acceptable":"#FF9800",
        "Bad":"#D32F2F"
    }[cls] || "#000000";
}


// Null-safe display
function safe(val){
    return (val === null || val === undefined || val === "")
        ? "N/A"
        : val;
}


fetch("./updated_iri.geojson")
.then(response => {

    if(!response.ok){
        throw new Error("GeoJSON not found");
    }

    return response.json();

})
.then(data => {

    console.log(data);

    var layer = L.geoJSON(data, {

        style: function(feature){
            return {
                color: feature.properties.color_hex ||
                       getColor(feature.properties.iri_class),
                weight: 7,
                opacity: 0.9
            };
        },

        onEachFeature: function(feature, layer){

            var p = feature.properties;

            layer.bindPopup(
                "<b>Road Name:</b> " + safe(p.road_id) +
                "<br><b>Segment IRI:</b> " + safe(p.seg_iri_in_mi) + " in/mile" +
                "<br><b>Segment Length:</b> " + safe(p.seg_len_mi) + " mile" +
                "<br><b>Whole IRI:</b> " + safe(p.whole_iri_in_mi) + " in/mile" +
                "<br><b>Direction:</b> " + safe(p.direction) +
                "<br><b>Surface:</b> " + safe(p.surface) +
                "<br><b>Collection Date:</b> " + safe(p.collect_dt)
            );

            // Hover effect
            layer.on({
                mouseover: function(e){
                    e.target.setStyle({
                        weight:10
                    });
                },
                mouseout: function(e){
                    layer.resetStyle
                        ? layer.resetStyle(e.target)
                        : e.target.setStyle({weight:7});
                }
            });

        }

    }).addTo(map);

    // Fit all Iowa data nicely
    map.fitBounds(layer.getBounds(), {
        padding:[40,40]
    });

})
.catch(error => {

    console.error(error);
    alert(error);

});


// Legend
var legend = L.control({position:'bottomleft'});

legend.onAdd = function(){

    var div = L.DomUtil.create('div','legend');

    div.innerHTML =
    '<b>IRI (in/mile)</b><br>' +
    '<i style="background:#2E7D32"></i> Excellent (&lt;85)<br>' +
    '<i style="background:#8BC34A"></i> Good (85–105)<br>' +
    '<i style="background:#FFFF00"></i> Fair (105–125)<br>' +
    '<i style="background:#FF9800"></i> Acceptable (125–145)<br>' +
    '<i style="background:#D32F2F"></i> Bad (&gt;145)';

    return div;
};

legend.addTo(map);

</script>

</body>
</html>
